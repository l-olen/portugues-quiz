<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz -- Vocabulário Novo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8; color: #2d3748; min-height: 100vh; padding: 20px; }
  .container { max-width: 680px; margin: 0 auto; }
  header { text-align: center; padding: 30px 0 20px; }
  header h1 { font-size: 1.8rem; color: #4a5568; margin-bottom: 6px; }
  header p { color: #718096; font-size: 0.95rem; }
  .back-link { display: inline-block; margin-bottom: 16px; color: #718096; font-size: 0.88rem; text-decoration: none; }
  .back-link:hover { color: #4a5568; }

  /* Filter buttons */
  .filter-wrap { margin-bottom: 20px; }
  .filter-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #a0aec0; margin-bottom: 8px; display: block; }
  .filter-buttons { display: flex; flex-wrap: wrap; gap: 8px; }
  .filter-btn {
    font-size: 0.8rem;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 20px;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
    background: white;
    color: #4a5568;
    border-color: #e2e8f0;
  }
  .filter-btn.active { border-color: currentColor; }
  .filter-btn[data-cat="Todos"]      { color: #4a5568; }
  .filter-btn[data-cat="Todos"].active { background: #edf2f7; }
  .filter-btn[data-cat="Emoções"]    { color: #b7791f; }
  .filter-btn[data-cat="Emoções"].active { background: #fefcbf; }
  .filter-btn[data-cat="Ações"]      { color: #276749; }
  .filter-btn[data-cat="Ações"].active { background: #f0fff4; }
  .filter-btn[data-cat="Caráter"]    { color: #c05621; }
  .filter-btn[data-cat="Caráter"].active { background: #fffaf0; }
  .filter-btn[data-cat="Conceitos"]  { color: #6b46c1; }
  .filter-btn[data-cat="Conceitos"].active { background: #faf5ff; }
  .filter-btn[data-cat="Expressões"] { color: #2b6cb0; }
  .filter-btn[data-cat="Expressões"].active { background: #ebf8ff; }
  .filter-btn[data-cat="Objetos"]    { color: #97266d; }
  .filter-btn[data-cat="Objetos"].active { background: #fff5f7; }

  /* Progress */
  .progress-bar-wrap { background: #e2e8f0; border-radius: 8px; height: 8px; margin: 20px 0 4px; }
  .progress-bar { height: 8px; border-radius: 8px; background: linear-gradient(90deg, #667eea, #764ba2); transition: width 0.4s ease; }
  .progress-label { text-align: right; font-size: 0.82rem; color: #718096; margin-top: 4px; }

  /* Card */
  .card { background: white; border-radius: 16px; padding: 30px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 20px; }
  .category-badge { display: inline-block; font-size: 0.73rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; padding: 3px 10px; border-radius: 20px; margin-bottom: 14px; }
  .badge-emocoes   { background: #fefcbf; color: #b7791f; }
  .badge-acoes     { background: #f0fff4; color: #276749; }
  .badge-carater   { background: #fffaf0; color: #c05621; }
  .badge-conceitos { background: #faf5ff; color: #6b46c1; }
  .badge-expressoes{ background: #ebf8ff; color: #2b6cb0; }
  .badge-objetos   { background: #fff5f7; color: #97266d; }

  .question { font-size: 1.1rem; font-weight: 600; line-height: 1.6; margin-bottom: 20px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn { background: #f7fafc; border: 2px solid #e2e8f0; border-radius: 10px; padding: 13px 18px; font-size: 1rem; text-align: left; cursor: pointer; transition: all 0.15s; color: #2d3748; }
  .option-btn:hover:not(:disabled) { background: #edf2f7; border-color: #cbd5e0; }
  .option-btn.correct { background: #f0fff4; border-color: #68d391; color: #276749; font-weight: 600; }
  .option-btn.wrong   { background: #fff5f5; border-color: #fc8181; color: #c53030; }
  .option-btn:disabled { cursor: default; }

  .feedback { margin-top: 16px; padding: 12px 16px; border-radius: 10px; font-size: 0.9rem; line-height: 1.5; display: none; }
  .feedback.show { display: block; }
  .feedback.ok  { background: #f0fff4; color: #276749; border-left: 4px solid #68d391; }
  .feedback.err { background: #fff5f5; color: #c53030; border-left: 4px solid #fc8181; }

  .next-btn { display: none; margin-top: 18px; width: 100%; padding: 14px; background: #667eea; color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.15s; }
  .next-btn:hover { background: #5a67d8; }
  .next-btn.show { display: block; }

  /* Results */
  .results { display: none; text-align: center; padding: 40px 30px; }
  .results.show { display: block; }
  .score-circle { width: 120px; height: 120px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 20px; color: white; }
  .score-circle .num { font-size: 2.2rem; font-weight: 700; line-height: 1; }
  .score-circle .denom { font-size: 0.85rem; opacity: 0.85; }
  .results h2 { font-size: 1.5rem; margin-bottom: 8px; }
  .results p { color: #718096; margin-bottom: 24px; }
  .btn-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .restart-btn { padding: 13px 32px; background: #667eea; color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; }
  .restart-btn:hover { background: #5a67d8; }
  .home-btn { padding: 13px 32px; background: #edf2f7; color: #4a5568; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; }
  .home-btn:hover { background: #e2e8f0; }

  .mistakes-list { text-align: left; margin-top: 28px; }
  .mistakes-list h3 { font-size: 1rem; color: #c53030; margin-bottom: 12px; }
  .mistake-item { background: #fff5f5; border-radius: 10px; padding: 12px 16px; margin-bottom: 8px; font-size: 0.88rem; line-height: 1.5; }
  .mistake-item .mq { font-weight: 600; color: #2d3748; margin-bottom: 4px; }
  .mistake-item .ma { color: #276749; }

  footer { text-align: center; padding: 32px 0 20px; font-size: 0.8rem; color: #cbd5e0; }
</style>
</head>
<body>
<div class="container">

  <a class="back-link" href="index.html">← Voltar ao menu</a>

  <header>
    <h1>Vocabulário Novo</h1>
    <p>~100 palavras · 6 temas · PT→RU · RU→PT · No contexto</p>
  </header>

  <div class="filter-wrap">
    <span class="filter-label">Filtrar por tema</span>
    <div class="filter-buttons">
      <button class="filter-btn active" data-cat="Todos" onclick="setFilter('Todos',this)">Todos</button>
      <button class="filter-btn" data-cat="Emoções" onclick="setFilter('Emoções',this)">Emoções</button>
      <button class="filter-btn" data-cat="Ações" onclick="setFilter('Ações',this)">Ações</button>
      <button class="filter-btn" data-cat="Caráter" onclick="setFilter('Caráter',this)">Caráter</button>
      <button class="filter-btn" data-cat="Conceitos" onclick="setFilter('Conceitos',this)">Conceitos</button>
      <button class="filter-btn" data-cat="Expressões" onclick="setFilter('Expressões',this)">Expressões</button>
      <button class="filter-btn" data-cat="Objetos" onclick="setFilter('Objetos',this)">Objetos e lugar</button>
    </div>
  </div>

  <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
  <div class="progress-label" id="progressLabel">1 / ?</div>

  <div class="card" id="quizCard">
    <span class="category-badge" id="catBadge"></span>
    <div class="question" id="questionText"></div>
    <div class="options" id="optionsDiv"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Próxima pergunta →</button>
  </div>

  <div class="card results" id="resultsCard">
    <div class="score-circle"><div class="num" id="scoreNum">0</div><div class="denom" id="scoreDenom">/ 0</div></div>
    <h2 id="resultTitle"></h2>
    <p id="resultMsg"></p>
    <div class="btn-row">
      <button class="restart-btn" onclick="restart()">Recomeçar</button>
      <a class="home-btn" href="index.html">Menu principal</a>
    </div>
    <div class="mistakes-list" id="mistakesList"></div>
  </div>

</div>

<footer>Português Europeu (PE) · Nível A2–B1</footer>

<script>
const allQuestions = [
  // EMOCOES
  { cat:"Emoções", badge:"badge-emocoes", q:"O que significa «apaixonar-se»?", options:["влюбляться","убегать","узнавать","зажигать"], answer:0, explanation:"Apaixonar-se = влюбиться. Ex.: Ela apaixonou-se por ele à primeira vista." },
  { cat:"Emoções", badge:"badge-emocoes", q:"«Coragem» em russo:", options:["храбрость","желание","красота","одиночество"], answer:0, explanation:"Coragem = храбрость, смелость. Ex.: Teve coragem de dizer a verdade." },
  { cat:"Emoções", badge:"badge-emocoes", q:"O que significa «solidão»?", options:["одиночество","грусть","скука","усталость"], answer:0, explanation:"Solidão = одиночество. Ex.: Sentia muita solidão depois de se mudar para Lisboa." },
  { cat:"Emoções", badge:"badge-emocoes", q:"«Alegria» em russo:", options:["радость","злость","страх","удивление"], answer:0, explanation:"Alegria = радость. Ex.: As crianças gritavam de alegria." },
  { cat:"Emoções", badge:"badge-emocoes", q:"O que significa «desconfiança»?", options:["недоверие","разочарование","стыд","зависть"], answer:0, explanation:"Desconfiança = недоверие. Ex.: Ele olhou com desconfiança para o estranho." },
  { cat:"Emoções", badge:"badge-emocoes", q:"Completa: «Causou uma boa ___ na entrevista.»", options:["impressão","ação","influência","referência"], answer:0, explanation:"Impressão = впечатление. Causar boa impressão = произвести хорошее впечатление." },
  { cat:"Emoções", badge:"badge-emocoes", q:"«Paixão» em russo:", options:["страсть","грусть","тоска","обида"], answer:0, explanation:"Paixão = страсть. Ex.: A música é a sua grande paixão." },
  { cat:"Emoções", badge:"badge-emocoes", q:"O que significa «compassivo»?", options:["сострадательный","рассеянный","хрупкий","далекий"], answer:0, explanation:"Compassivo = сострадательный. Ex.: Ela é muito compassiva com quem sofre." },
  { cat:"Emoções", badge:"badge-emocoes", q:"O que significa «desejo»?", options:["желание","радость","страсть","тоска"], answer:0, explanation:"Desejo = желание. Desejar = хотеть, желать. Ex.: O meu maior desejo é viajar." },
  { cat:"Emoções", badge:"badge-emocoes", q:"Completa: «A ___ da natureza impressiona-me.»", options:["beleza","realidade","influência","ação"], answer:0, explanation:"Beleza = красота. Que beleza! = Как красиво!" },

  // ACOES
  { cat:"Ações", badge:"badge-acoes", q:"«Fugir» significa...", options:["сбежать","узнать","управлять","реагировать"], answer:0, explanation:"Fugir = сбежать, убежать. Ex.: O ladrão tentou fugir da polícia. Fuga (сущ.) = побег." },
  { cat:"Ações", badge:"badge-acoes", q:"«Descobrir» em russo:", options:["узнать/открыть","зажечь","заменить","бросить"], answer:0, explanation:"Descobrir = узнать, открыть, обнаружить. Ex.: Ela descobriu a verdade por acidente." },
  { cat:"Ações", badge:"badge-acoes", q:"Completa: «Podes ___ a luz, por favor?»", options:["acender","fugir","atirar","brilhar"], answer:0, explanation:"Acender = зажечь, включить (свет). Apagar = выключить (противоположное)." },
  { cat:"Ações", badge:"badge-acoes", q:"O que significa «reagir»?", options:["реагировать","управлять","бросать","отправлять"], answer:0, explanation:"Reagir = реагировать. Ex.: Como é que ela vai reagir à notícia?" },
  { cat:"Ações", badge:"badge-acoes", q:"«Substituir» em russo:", options:["заменить","объединить","передать","назначить"], answer:0, explanation:"Substituir = заменить. Ex.: Temos de substituir o professor que ficou doente." },
  { cat:"Ações", badge:"badge-acoes", q:"O que significa «atirar»?", options:["бросать/стрелять","зажигать","управлять","узнавать"], answer:0, explanation:"Atirar = бросать или стрелять. Ex.: Ela atirou a bola para ele." },
  { cat:"Ações", badge:"badge-acoes", q:"Completa: «Temos de ___ os nossos medos.»", options:["enfrentar","fugir","substituir","perder"], answer:0, explanation:"Enfrentar = противостоять, встретить лицом к лицу. Ex.: Enfrentar um problema = справиться с проблемой." },
  { cat:"Ações", badge:"badge-acoes", q:"«Marcar uma consulta» significa...", options:["записаться к врачу","отменить встречу","прийти на приём","забыть встречу"], answer:0, explanation:"Marcar = назначить. Marcar uma consulta = записаться к врачу. Marcar um encontro = назначить встречу." },
  { cat:"Ações", badge:"badge-acoes", q:"«Enviar» em russo:", options:["отправить","наблюдать","собрать","искать"], answer:0, explanation:"Enviar = отправить. Ex.: Podes enviar o documento por email?" },
  { cat:"Ações", badge:"badge-acoes", q:"O que significa «surgir»?", options:["возникнуть/появиться","исчезнуть","остаться","бежать"], answer:0, explanation:"Surgir = возникнуть, появиться. Ex.: Surgiu um problema inesperado." },
  { cat:"Ações", badge:"badge-acoes", q:"Completa: «É difícil ___ com o stress.»", options:["lidar","fugir","atirar","combinar"], answer:0, explanation:"Lidar com = справляться с чем-то. Ex.: Não sei lidar com esta situação." },
  { cat:"Ações", badge:"badge-acoes", q:"«Procurar» em russo:", options:["искать","помнить","учить","наблюдать"], answer:0, explanation:"Procurar = искать. Ex.: Estou a procurar as minhas chaves." },
  { cat:"Ações", badge:"badge-acoes", q:"O que significa «brilhar»?", options:["сиять/блестеть","гореть","светить","темнеть"], answer:0, explanation:"Brilhar = сиять, блестеть. Ex.: Os olhos dela brilhavam de alegria." },
  { cat:"Ações", badge:"badge-acoes", q:"O que significa «espantar»?", options:["удивлять/отпугивать","бросать","гореть","узнавать"], answer:0, explanation:"Espantar = удивлять или отпугивать. Espantar o medo = отпугнуть страх." },
  { cat:"Ações", badge:"badge-acoes", q:"Completa: «É fácil ___ com o telemóvel.»", options:["distrair-se","apreciar-se","lembrar-se","transmitir-se"], answer:0, explanation:"Distrair-se = отвлечься. Distraído = рассеянный (прилагательное)." },
  { cat:"Ações", badge:"badge-acoes", q:"«Transmitir» em russo:", options:["передать","получить","отправить","наблюдать"], answer:0, explanation:"Transmitir = передать. Ex.: Ele conseguiu transmitir a sua emoção ao público." },
  { cat:"Ações", badge:"badge-acoes", q:"O que significa «lembrar»?", options:["помнить","забыть","искать","знать"], answer:0, explanation:"Lembrar = помнить. Não me lembro = не помню. Lembrar-se de = вспомнить о чём-то." },
  { cat:"Ações", badge:"badge-acoes", q:"Completa: «___ uma boa impressão é importante numa entrevista.»", options:["Causar","Marcar","Enviar","Fugir"], answer:0, explanation:"Causar = вызвать. Causar impressão = произвести впечатление. Causar problemas = создавать проблемы." },
  { cat:"Ações", badge:"badge-acoes", q:"O que significa «pentear»?", options:["расчесывать","взлохмачивать","стричь","мыть"], answer:0, explanation:"Pentear = расчесывать. Despentear = взлохмачивать (обратное действие)." },
  { cat:"Ações", badge:"badge-acoes", q:"«Combinar» em russo:", options:["объединить/сочетать","отменить","разделить","сравнить"], answer:0, explanation:"Combinar = объединить, сочетать, договориться. Ex.: Vamos combinar um encontro." },
  { cat:"Ações", badge:"badge-acoes", q:"O que significa «tornar»?", options:["стать/сделать","вернуть","повернуть","дать"], answer:0, explanation:"Tornar(-se) = стать. Ex.: Ela tornou-se famosa. Tornar possível = сделать возможным." },

  // CARATER
  { cat:"Caráter", badge:"badge-carater", q:"«Distraído» significa...", options:["рассеянный","сострадательный","необычный","хрупкий"], answer:0, explanation:"Distraído = рассеянный, отвлечённый. Ex.: Ele é tão distraído que esquece sempre as chaves." },
  { cat:"Caráter", badge:"badge-carater", q:"«Sonhador» em russo:", options:["мечтатель","реалист","режиссёр","наблюдатель"], answer:0, explanation:"Sonhador = мечтатель. Ex.: Ela é uma sonhadora — quer mudar o mundo." },
  { cat:"Caráter", badge:"badge-carater", q:"O que significa «inútil»?", options:["бесполезный","необычный","важный","подходящий"], answer:0, explanation:"Inútil = бесполезный. Ex.: Este objeto é completamente inútil para mim." },
  { cat:"Caráter", badge:"badge-carater", q:"Completa: «Ela tem um talento ___.»", options:["invulgar","inútil","frágil","redondo"], answer:0, explanation:"Invulgar = необычный, редкий. Ex.: Uma pessoa invulgar = необычный человек." },
  { cat:"Caráter", badge:"badge-carater", q:"«Marcante» em russo:", options:["поразительный/незабываемый","обычный","скучный","простой"], answer:0, explanation:"Marcante = поразительный, незабываемый. Ex.: Foi uma experiência muito marcante." },
  { cat:"Caráter", badge:"badge-carater", q:"O que significa «adequado»?", options:["подходящий","необходимый","важный","обязательный"], answer:0, explanation:"Adequado = подходящий, соответствующий. Ex.: Esta roupa não é adequada para o trabalho." },
  { cat:"Caráter", badge:"badge-carater", q:"«Realizador» significa...", options:["режиссёр","мечтатель","наблюдатель","исследователь"], answer:0, explanation:"Realizador = режиссёр (кино/театра). Ex.: O realizador ganhou um prémio no festival." },
  { cat:"Caráter", badge:"badge-carater", q:"«Frágil» em russo:", options:["хрупкий","мягкий","тонкий","лёгкий"], answer:0, explanation:"Frágil = хрупкий. Ex.: Cuidado! O vaso é muito frágil." },
  { cat:"Caráter", badge:"badge-carater", q:"Completa: «Ele tem um ___ conhecimento de história.»", options:["profundo","redondo","longínquo","inútil"], answer:0, explanation:"Profundo = глубокий. Profundo conhecimento = глубокое знание. No fundo = на самом деле." },
  { cat:"Caráter", badge:"badge-carater", q:"«Longínquo» em russo:", options:["далёкий","близкий","древний","загадочный"], answer:0, explanation:"Longínquo = далёкий, отдалённый. Ex.: Vivem numa terra longínqua." },
  { cat:"Caráter", badge:"badge-carater", q:"«Inimaginável» significa...", options:["невообразимый","невозможный","нереальный","невидимый"], answer:0, explanation:"Inimaginável = невообразимый. Ex.: A sua coragem é inimaginável." },
  { cat:"Caráter", badge:"badge-carater", q:"O que significa «essencial»?", options:["важный/необходимый","полезный","достаточный","обычный"], answer:0, explanation:"Essencial = важный, необходимый, существенный. Ex.: A água é essencial para a vida." },
  { cat:"Caráter", badge:"badge-carater", q:"«Desalinhado» em russo:", options:["взлохмаченный/неопрятный","рассеянный","строгий","усталый"], answer:0, explanation:"Desalinhado = взлохмаченный, неопрятный, растрёпанный. Ex.: Ele chegou desalinhado à reunião." },

  // CONCEITOS
  { cat:"Conceitos", badge:"badge-conceitos", q:"«Influência» em russo:", options:["влияние","действие","результат","распределение"], answer:0, explanation:"Influência = влияние. Ex.: Ele tem muita influência na empresa." },
  { cat:"Conceitos", badge:"badge-conceitos", q:"O que significa «propósito»?", options:["цель/намерение","действие","результат","влияние"], answer:0, explanation:"Propósito = цель, намерение. Ex.: Com que propósito fizeste isso? = Зачем ты это сделал?" },
  { cat:"Conceitos", badge:"badge-conceitos", q:"«Consequência» em russo:", options:["последствие/результат","причина","решение","влияние"], answer:0, explanation:"Consequência = последствие, результат. Por consequência = в результате, следовательно." },
  { cat:"Conceitos", badge:"badge-conceitos", q:"Completa: «Foi um longo ___ até chegar aqui.»", options:["percurso","propósito","esforço","mistério"], answer:0, explanation:"Percurso = путь, маршрут. Ex.: O percurso do autocarro passa pela escola." },
  { cat:"Conceitos", badge:"badge-conceitos", q:"«Inspiração» significa...", options:["вдохновение","воображение","мечта","мысль"], answer:0, explanation:"Inspiração = вдохновение. Ex.: A natureza é a minha grande inspiração." },
  { cat:"Conceitos", badge:"badge-conceitos", q:"«Mistério» em russo:", options:["тайна","легенда","секрет","вопрос"], answer:0, explanation:"Mistério = тайна, загадка. Ex.: A sua desaparição continua a ser um mistério." },
  { cat:"Conceitos", badge:"badge-conceitos", q:"O que significa «esforço»?", options:["усилие","результат","действие","влияние"], answer:0, explanation:"Esforço = усилие. Sem esforço = без усилий, легко. Ex.: Ela fala cinco línguas sem esforço." },

];

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

let activeFilter = "Todos";
let questions = [];
let current = 0;
let score = 0;
let mistakes = [];
let answered = false;
let shuffledOptions = [];

function setFilter(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  restart();
}

function restart() {
  let pool = activeFilter === "Todos" ? allQuestions : allQuestions.filter(q => q.cat === activeFilter);
  questions = shuffle(pool);
  current = 0;
  score = 0;
  mistakes = [];
  answered = false;
  document.getElementById('quizCard').style.display = 'block';
  document.getElementById('resultsCard').classList.remove('show');
  showQuestion();
}

function showQuestion() {
  if (current >= questions.length) { showResults(); return; }
  const q = questions[current];
  answered = false;

  document.getElementById('progressBar').style.width = (current / questions.length * 100) + '%';
  document.getElementById('progressLabel').textContent = (current + 1) + ' / ' + questions.length;

  const badge = document.getElementById('catBadge');
  badge.textContent = q.cat;
  badge.className = 'category-badge ' + q.badge;

  document.getElementById('questionText').textContent = q.q;

  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.textContent = '';

  document.getElementById('nextBtn').classList.remove('show');

  // shuffle options keeping track of correct answer
  const indexed = q.options.map((opt, i) => ({ opt, correct: i === q.answer }));
  const shuffled = shuffle(indexed);
  shuffledOptions = shuffled;

  const div = document.getElementById('optionsDiv');
  div.innerHTML = '';
  shuffled.forEach((item, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = item.opt;
    btn.onclick = () => checkAnswer(i, btn);
    div.appendChild(btn);
  });
}

function checkAnswer(idx, btn) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  const isCorrect = shuffledOptions[idx].correct;
  const allBtns = document.querySelectorAll('.option-btn');

  allBtns.forEach((b, i) => {
    b.disabled = true;
    if (shuffledOptions[i].correct) b.classList.add('correct');
  });

  const fb = document.getElementById('feedback');
  if (isCorrect) {
    score++;
    btn.classList.add('correct');
    fb.className = 'feedback ok show';
    fb.textContent = 'Correto! ' + q.explanation;
  } else {
    btn.classList.add('wrong');
    fb.className = 'feedback err show';
    fb.textContent = 'Errado. ' + q.explanation;
    mistakes.push({ q: q.q, explanation: q.explanation });
  }

  document.getElementById('nextBtn').classList.add('show');
  document.getElementById('nextBtn').textContent = current < questions.length - 1 ? 'Próxima pergunta →' : 'Ver resultados →';
}

function nextQuestion() {
  current++;
  showQuestion();
}

function showResults() {
  document.getElementById('progressBar').style.width = '100%';
  document.getElementById('quizCard').style.display = 'none';
  const res = document.getElementById('resultsCard');
  res.classList.add('show');

  document.getElementById('scoreNum').textContent = score;
  document.getElementById('scoreDenom').textContent = '/ ' + questions.length;

  const pct = Math.round(score / questions.length * 100);
  let title, msg;
  if (pct >= 90)      { title = 'Excelente!';      msg = 'Vocabulário dominado!'; }
  else if (pct >= 70) { title = 'Muito bem!';       msg = 'Só mais um pouco de prática.'; }
  else if (pct >= 50) { title = 'Bom esforço!';     msg = 'Continua a praticar estas palavras.'; }
  else                { title = 'Continua!';         msg = 'Revê as palavras e tenta outra vez.'; }

  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultMsg').textContent = pct + '% correto. ' + msg;

  const ml = document.getElementById('mistakesList');
  if (mistakes.length > 0) {
    ml.innerHTML = '<h3>Rever (' + mistakes.length + '):</h3>';
    mistakes.forEach(m => {
      ml.innerHTML += '<div class="mistake-item"><div class="mq">' + m.q + '</div><div class="ma">' + m.explanation + '</div></div>';
    });
  } else {
    ml.innerHTML = '';
  }
}

// init
restart();
</script>
