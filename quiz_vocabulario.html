<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz -- Vocabulário</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8; color: #2d3748; min-height: 100vh; padding: 20px; }
  .container { max-width: 680px; margin: 0 auto; }
  header { text-align: center; padding: 30px 0 20px; }
  header h1 { font-size: 1.8rem; color: #b7791f; margin-bottom: 6px; }
  header p { color: #718096; font-size: 0.95rem; }
  .back-link { display: inline-block; margin-bottom: 16px; color: #718096; font-size: 0.88rem; text-decoration: none; }
  .back-link:hover { color: #b7791f; }
  .progress-bar-wrap { background: #e2e8f0; border-radius: 8px; height: 8px; margin: 20px 0; }
  .progress-bar { height: 8px; border-radius: 8px; background: linear-gradient(90deg, #ed8936, #fbd38d); transition: width 0.4s ease; }
  .progress-label { text-align: right; font-size: 0.82rem; color: #718096; margin-top: 4px; }
  .card { background: white; border-radius: 16px; padding: 30px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 20px; }
  .category-badge { display: inline-block; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; padding: 3px 10px; border-radius: 20px; margin-bottom: 14px; }
  .badge-pt-ru { background: #fffbeb; color: #92400e; }
  .badge-ru-pt { background: #fff7ed; color: #c05621; }
  .badge-contexto { background: #ebf8ff; color: #2b6cb0; }
  .question { font-size: 1.15rem; font-weight: 600; line-height: 1.5; margin-bottom: 20px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn { background: #f7fafc; border: 2px solid #e2e8f0; border-radius: 10px; padding: 13px 18px; font-size: 1rem; text-align: left; cursor: pointer; transition: all 0.15s; color: #2d3748; }
  .option-btn:hover:not(:disabled) { background: #fffbeb; border-color: #fbd38d; }
  .option-btn.correct { background: #f0fff4; border-color: #68d391; color: #276749; font-weight: 600; }
  .option-btn.wrong { background: #fff5f5; border-color: #fc8181; color: #c53030; }
  .option-btn:disabled { cursor: default; }
  .feedback { margin-top: 16px; padding: 12px 16px; border-radius: 10px; font-size: 0.9rem; line-height: 1.5; display: none; }
  .feedback.show { display: block; }
  .feedback.ok  { background: #f0fff4; color: #276749; border-left: 4px solid #68d391; }
  .feedback.err { background: #fff5f5; color: #c53030; border-left: 4px solid #fc8181; }
  .next-btn { display: none; margin-top: 18px; width: 100%; padding: 14px; background: #ed8936; color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.15s; }
  .next-btn:hover { background: #c05621; }
  .next-btn.show { display: block; }
  .results { display: none; text-align: center; padding: 40px 30px; }
  .results.show { display: block; }
  .score-circle { width: 120px; height: 120px; border-radius: 50%; background: linear-gradient(135deg, #ed8936, #fbd38d); display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 20px; color: white; }
  .score-circle .num { font-size: 2.2rem; font-weight: 700; line-height: 1; }
  .score-circle .denom { font-size: 0.85rem; opacity: 0.85; }
  .results h2 { font-size: 1.5rem; margin-bottom: 8px; }
  .results p { color: #718096; margin-bottom: 24px; }
  .btn-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .restart-btn { padding: 13px 32px; background: #ed8936; color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; }
  .home-btn { padding: 13px 32px; background: #edf2f7; color: #4a5568; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; }
  .home-btn:hover { background: #e2e8f0; }
  .mistakes-list { text-align: left; margin-top: 28px; }
  .mistakes-list h3 { font-size: 1rem; color: #c53030; margin-bottom: 12px; }
  .mistake-item { background: #fff5f5; border-radius: 8px; padding: 10px 14px; margin-bottom: 8px; font-size: 0.88rem; line-height: 1.5; }
  .mistake-item strong { color: #c53030; }
  .mistake-item .correct-ans { color: #276749; font-weight: 600; }
</style>
</head>
<body>
<div class="container">
  <a class="back-link" href="index.html">← Voltar ao menu</a>
  <header>
    <h1>Vocabulário</h1>
    <p>Aspeto físico · Sociedade · Trabalho</p>
  </header>
  <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
  <div class="progress-label" id="progressLabel"></div>
  <div class="card" id="quizCard">
    <div class="category-badge" id="badge"></div>
    <div class="question" id="question"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Próxima questão →</button>
  </div>
  <div class="card results" id="results">
    <div class="score-circle"><span class="num" id="scoreNum"></span><span class="denom" id="scoreDenom"></span></div>
    <h2 id="resultsTitle"></h2><p id="resultsMsg"></p>
    <div class="btn-row">
      <button class="restart-btn" onclick="restart()">Repetir quiz</button>
      <a class="home-btn" href="index.html">Menu principal</a>
    </div>
    <div class="mistakes-list" id="mistakesList"></div>
  </div>
</div>
<script>
const questions = [
  // PT → RU
  { cat:"pt-ru", q:"O que significa «aspeto físico»?", options:["внутренний мир","внешний вид / внешность","образ жизни","физические упражнения"], answer:1, explanation:"Aspeto físico = внешний вид / внешность." },
  { cat:"pt-ru", q:"O que significa «redes sociais»?", options:["рабочие связи","социальные сети","телевизионные каналы","мобильные сети"], answer:1, explanation:"Redes sociais = социальные сети (Instagram, Facebook и т.д.)." },
  { cat:"pt-ru", q:"O que significa «influência»?", options:["следствие","влияние","причина","разница"], answer:1, explanation:"Influência = влияние. Глагол: influenciar / influenciar." },
  { cat:"pt-ru", q:"O que significa «aparência»?", options:["появление","внешность / вид","прозрачность","редкость"], answer:1, explanation:"Aparência = внешность / вид. Синоним: aspeto físico." },
  { cat:"pt-ru", q:"O que significa «impressão»?", options:["распечатка","впечатление","выражение","давление"], answer:1, explanation:"Impressão = впечатление. \"A primeira impressão é muito importante.\"" },
  { cat:"pt-ru", q:"O que significa «jovens»?", options:["пожилые","дети","молодёжь / молодые","взрослые"], answer:2, explanation:"Jovens = молодёжь / молодые люди. Ед.ч.: jovem." },
  { cat:"pt-ru", q:"O que significa «competências»?", options:["конкуренты","компетенции / навыки","соревнования","достижения"], answer:1, explanation:"Competências = компетенции / навыки / умения." },
  { cat:"pt-ru", q:"O que significa «pressão»?", options:["удовольствие","презентация","давление / стресс","прогресс"], answer:2, explanation:"Pressão = давление. \"Causa muita pressão nos jovens.\"" },
  { cat:"pt-ru", q:"O que significa «cuidam de si»?", options:["заботятся о других","заботятся о себе","думают о себе","торопятся"], answer:1, explanation:"Cuidar de si = заботиться о себе. Cuidar de = заботиться о (ком-то/чём-то)." },
  { cat:"pt-ru", q:"O que significa «entrevista de emprego»?", options:["журнальное интервью","собеседование о работе","рабочее собрание","трудовой договор"], answer:1, explanation:"Entrevista de emprego = собеседование о работе." },
  { cat:"pt-ru", q:"O que significa «sociedade»?", options:["компания (фирма)","совет","общество","встреча"], answer:2, explanation:"Sociedade = общество. \"Vivemos numa sociedade visual.\"" },
  { cat:"pt-ru", q:"O que significa «afirmação»?", options:["отрицание","утверждение","вопрос","предположение"], answer:1, explanation:"Afirmação = утверждение. \"Concordo com esta afirmação.\"" },
  // RU → PT
  { cat:"ru-pt", q:"Как по-португальски «фотографии»?", options:["imagens","fotografias","pinturas","desenhos"], answer:1, explanation:"Fotografias = фотографии. Ед.ч.: fotografia." },
  { cat:"ru-pt", q:"Как по-португальски «мнения»?", options:["opiniões","impressões","afirmações","influências"], answer:0, explanation:"Opiniões = мнения. Ед.ч.: opinião. \"As opiniões das outras pessoas.\"" },
  { cat:"ru-pt", q:"Как по-португальски «судят» (глагол julgar)?", options:["julgam","pensam","querem","cuidam"], answer:0, explanation:"Julgar = судить / оценивать. \"As pessoas julgam muito pela imagem.\"" },
  { cat:"ru-pt", q:"Как по-португальски «думают» (глагол pensar)?", options:["julgam","querem","pensam","gostam"], answer:2, explanation:"Pensar = думать. \"As pessoas pensam muito no aspeto físico.\"" },
  { cat:"ru-pt", q:"Как по-португальски «хотят» (глагол querer)?", options:["pensam","gostam","querem","julgam"], answer:2, explanation:"Querer = хотеть. \"Querem ser bonitas nas fotos.\"" },
  // В контексте
  { cat:"contexto", q:"\"A primeira ___ é muito importante numa entrevista.\"", options:["influência","pressão","impressão","aparência"], answer:2, explanation:"A primeira impressão = первое впечатление. Устойчивое выражение." },
  { cat:"contexto", q:"\"As redes sociais têm muita ___ na vida dos jovens.\"", options:["pressão","impressão","influência","afirmação"], answer:2, explanation:"Influência = влияние. \"Ter influência\" = оказывать влияние." },
  { cat:"contexto", q:"\"Isto causa muita ___, sobretudo nos jovens.\"", options:["influência","pressão","aparência","competência"], answer:1, explanation:"Pressão = давление. \"Causar pressão\" = создавать давление / стресс." },
  { cat:"contexto", q:"\"As pessoas ___ muito pela imagem.\" (судить)", options:["pensam","querem","gostam","julgam"], answer:3, explanation:"Julgar = судить. \"As pessoas julgam muito pela imagem.\"" },
  { cat:"contexto", q:"\"Por um lado, as pessoas ___ mais de si.\" (заботиться)", options:["pensam","cuidam","querem","julgam"], answer:1, explanation:"Cuidar de si = заботиться о себе. \"As pessoas cuidam mais de si.\"" },
];
const labelMap = { "pt-ru":"Português → Русский", "ru-pt":"Русский → Português", "contexto":"No contexto" };
const classMap = { "pt-ru":"badge-pt-ru", "ru-pt":"badge-ru-pt", "contexto":"badge-contexto" };
let current=0,score=0,answered=false,mistakes=[],shuffled=[];
function shuffle(arr){return[...arr].sort(()=>Math.random()-0.5);}
function start(){shuffled=shuffle(questions);current=0;score=0;answered=false;mistakes=[];document.getElementById('results').classList.remove('show');document.getElementById('quizCard').style.display='block';renderQuestion();}
function renderQuestion(){
  const q=shuffled[current],total=shuffled.length;
  document.getElementById('progressBar').style.width=(current/total*100)+'%';
  document.getElementById('progressLabel').textContent=`Questão ${current+1} de ${total}`;
  const badge=document.getElementById('badge');
  badge.textContent=labelMap[q.cat];badge.className='category-badge '+classMap[q.cat];
  document.getElementById('question').textContent=q.q;
  const optDiv=document.getElementById('options');optDiv.innerHTML='';
  const si=shuffle(q.options.map((_,i)=>i));const nc=si.indexOf(q.answer);
  si.forEach((oi,ni)=>{const btn=document.createElement('button');btn.className='option-btn';btn.textContent=q.options[oi];btn.onclick=()=>selectAnswer(ni,nc,q);optDiv.appendChild(btn);});
  document.getElementById('feedback').className='feedback';
  document.getElementById('nextBtn').className='next-btn';
  answered=false;
}
function selectAnswer(chosen,correct,q){
  if(answered)return;answered=true;
  const btns=document.querySelectorAll('.option-btn');btns.forEach(b=>b.disabled=true);
  btns[correct].classList.add('correct');
  const fb=document.getElementById('feedback');
  if(chosen===correct){score++;btns[chosen].classList.add('correct');fb.className='feedback ok show';fb.textContent='✓ Correto! '+q.explanation;}
  else{btns[chosen].classList.add('wrong');fb.className='feedback err show';fb.textContent='✗ Incorreto. '+q.explanation;mistakes.push({q:q.q,wrong:btns[chosen].textContent,right:q.options[q.answer]});}
  document.getElementById('nextBtn').className='next-btn show';
}
function nextQuestion(){current++;if(current>=shuffled.length)showResults();else renderQuestion();}
function showResults(){
  document.getElementById('quizCard').style.display='none';
  document.getElementById('progressBar').style.width='100%';
  const total=shuffled.length,pct=Math.round(score/total*100);
  document.getElementById('scoreNum').textContent=score;document.getElementById('scoreDenom').textContent='de '+total;
  const msgs=[['Não desistas!','Revê o vocabulário e tenta outra vez!'],['Continua!','Já conheces algumas palavras, continua a estudar!'],['Muito bem!','Bom resultado! Revê os erros abaixo.'],['Excelente!','Muito bom vocabulário!']];
  const m=msgs[pct>=90?3:pct>=70?2:pct>=50?1:0];
  document.getElementById('resultsTitle').textContent=m[0];document.getElementById('resultsMsg').textContent=`${pct}% correto. ${m[1]}`;
  const ml=document.getElementById('mistakesList');
  ml.innerHTML=mistakes.length>0?'<h3>Erros para rever:</h3>'+mistakes.map(m=>`<div class="mistake-item"><div>${m.q}</div><div>A tua resposta: <strong>${m.wrong}</strong> &nbsp;|&nbsp; Correto: <span class="correct-ans">${m.right}</span></div></div>`).join(''):'<p style="color:#276749;margin-top:16px">Sem erros! Perfeito!</p>';
  document.getElementById('results').classList.add('show');
}
function restart(){start();}
start();
</script>
</body>
</html>
