<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz -- Palavras de Ligação</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8; color: #2d3748; min-height: 100vh; padding: 20px; }
  .container { max-width: 680px; margin: 0 auto; }
  header { text-align: center; padding: 30px 0 20px; }
  header h1 { font-size: 1.8rem; color: #553c9a; margin-bottom: 6px; }
  header p { color: #718096; font-size: 0.95rem; }
  .back-link { display: inline-block; margin-bottom: 16px; color: #718096; font-size: 0.88rem; text-decoration: none; }
  .back-link:hover { color: #553c9a; }
  .progress-bar-wrap { background: #e2e8f0; border-radius: 8px; height: 8px; margin: 20px 0; }
  .progress-bar { height: 8px; border-radius: 8px; background: linear-gradient(90deg, #6b46c1, #b794f4); transition: width 0.4s ease; }
  .progress-label { text-align: right; font-size: 0.82rem; color: #718096; margin-top: 4px; }
  .card { background: white; border-radius: 16px; padding: 30px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 20px; }
  .category-badge { display: inline-block; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; padding: 3px 10px; border-radius: 20px; margin-bottom: 14px; }
  .badge-traducao  { background: #faf5ff; color: #6b46c1; }
  .badge-contexto  { background: #ebf8ff; color: #2b6cb0; }
  .question { font-size: 1.1rem; font-weight: 600; line-height: 1.6; margin-bottom: 20px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn { background: #f7fafc; border: 2px solid #e2e8f0; border-radius: 10px; padding: 13px 18px; font-size: 1rem; text-align: left; cursor: pointer; transition: all 0.15s; color: #2d3748; }
  .option-btn:hover:not(:disabled) { background: #faf5ff; border-color: #d6bcfa; }
  .option-btn.correct { background: #f0fff4; border-color: #68d391; color: #276749; font-weight: 600; }
  .option-btn.wrong { background: #fff5f5; border-color: #fc8181; color: #c53030; }
  .option-btn:disabled { cursor: default; }
  .feedback { margin-top: 16px; padding: 12px 16px; border-radius: 10px; font-size: 0.9rem; line-height: 1.5; display: none; }
  .feedback.show { display: block; }
  .feedback.ok  { background: #f0fff4; color: #276749; border-left: 4px solid #68d391; }
  .feedback.err { background: #fff5f5; color: #c53030; border-left: 4px solid #fc8181; }
  .next-btn { display: none; margin-top: 18px; width: 100%; padding: 14px; background: #6b46c1; color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.15s; }
  .next-btn:hover { background: #553c9a; }
  .next-btn.show { display: block; }
  .results { display: none; text-align: center; padding: 40px 30px; }
  .results.show { display: block; }
  .score-circle { width: 120px; height: 120px; border-radius: 50%; background: linear-gradient(135deg, #6b46c1, #b794f4); display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 20px; color: white; }
  .score-circle .num { font-size: 2.2rem; font-weight: 700; line-height: 1; }
  .score-circle .denom { font-size: 0.85rem; opacity: 0.85; }
  .results h2 { font-size: 1.5rem; margin-bottom: 8px; }
  .results p { color: #718096; margin-bottom: 24px; }
  .btn-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .restart-btn { padding: 13px 32px; background: #6b46c1; color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; }
  .restart-btn:hover { background: #553c9a; }
  .home-btn { padding: 13px 32px; background: #edf2f7; color: #4a5568; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; }
  .home-btn:hover { background: #e2e8f0; }
  .mistakes-list { text-align: left; margin-top: 28px; }
  .mistakes-list h3 { font-size: 1rem; color: #c53030; margin-bottom: 12px; }
  .mistake-item { background: #fff5f5; border-radius: 8px; padding: 10px 14px; margin-bottom: 8px; font-size: 0.88rem; line-height: 1.5; }
  .mistake-item strong { color: #c53030; }
  .mistake-item .correct-ans { color: #276749; font-weight: 600; }
</style>
</head>
<body>
<div class="container">
  <a class="back-link" href="index.html">← Voltar ao menu</a>
  <header>
    <h1>Palavras de Ligação</h1>
    <p>Conectores para composições e textos</p>
  </header>
  <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
  <div class="progress-label" id="progressLabel"></div>
  <div class="card" id="quizCard">
    <div class="category-badge" id="badge"></div>
    <div class="question" id="question"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Próxima questão →</button>
  </div>
  <div class="card results" id="results">
    <div class="score-circle"><span class="num" id="scoreNum"></span><span class="denom" id="scoreDenom"></span></div>
    <h2 id="resultsTitle"></h2><p id="resultsMsg"></p>
    <div class="btn-row">
      <button class="restart-btn" onclick="restart()">Repetir quiz</button>
      <a class="home-btn" href="index.html">Menu principal</a>
    </div>
    <div class="mistakes-list" id="mistakesList"></div>
  </div>
</div>
<script>
const questions = [
  // Перевод -- что значит слово
  { cat:"traducao", q:"O que significa «Em primeiro lugar»?", options:["в конце концов","во-первых","с другой стороны","кроме того"], answer:1, explanation:"Em primeiro lugar = во-первых / на первом месте. Используется для начала первого аргумента." },
  { cat:"traducao", q:"O que significa «Por outro lado»?", options:["во-первых","поэтому","с другой стороны","несмотря на"], answer:2, explanation:"Por outro lado = с другой стороны. Пара: Por um lado... Por outro lado..." },
  { cat:"traducao", q:"O que significa «No entanto»?", options:["поэтому","таким образом","однако / но","особенно"], answer:2, explanation:"No entanto = однако / но. Синонимы: mas, porém." },
  { cat:"traducao", q:"O que significa «Além disso»?", options:["несмотря на это","кроме того","во-первых","с другой стороны"], answer:1, explanation:"Além disso = кроме того / помимо этого. Добавляет аргумент." },
  { cat:"traducao", q:"O que significa «Sobretudo»?", options:["таким образом","во-первых","прежде всего / особенно","однако"], answer:2, explanation:"Sobretudo = прежде всего / особенно." },
  { cat:"traducao", q:"O que significa «Assim»?", options:["однако","таким образом","кроме того","с другой стороны"], answer:1, explanation:"Assim = таким образом. Используется в выводе." },
  { cat:"traducao", q:"O que significa «Por isso»?", options:["несмотря на","поэтому","однако","в наши дни"], answer:1, explanation:"Por isso = поэтому. Выражает следствие." },
  { cat:"traducao", q:"O que significa «Apesar de»?", options:["поэтому","во-первых","несмотря на","таким образом"], answer:2, explanation:"Apesar de = несмотря на. \"Apesar de ser difícil, continuo.\"" },
  { cat:"traducao", q:"O que significa «Na verdade»?", options:["в конце концов","на самом деле","во-первых","кроме того"], answer:1, explanation:"Na verdade = на самом деле. Синоним: De facto." },
  { cat:"traducao", q:"O que significa «Uma vez que»?", options:["однажды","однако","так как / поскольку","в наши дни"], answer:2, explanation:"Uma vez que = так как / поскольку. Вводит причину." },

  // В контексте -- выбери нужное слово
  { cat:"contexto", q:"\"___ vivemos numa sociedade digital, a tecnologia é muito importante.\"", options:["No entanto","Uma vez que","Além disso","Assim"], answer:1, explanation:"Uma vez que = так как. Вводит причину / обоснование." },
  { cat:"contexto", q:"\"Em primeiro lugar, as redes sociais têm muita influência. ___, o aspeto físico é importante no trabalho.\"", options:["Por isso","No entanto","Além disso","Apesar de"], answer:2, explanation:"Além disso = кроме того. Добавляет второй аргумент." },
  { cat:"contexto", q:"\"Por um lado, isto é positivo. ___, causa muita pressão nos jovens.\"", options:["Além disso","Por isso","Por outro lado","Assim"], answer:2, explanation:"Por um lado... Por outro lado = с одной стороны... с другой стороны." },
  { cat:"contexto", q:"\"___, na minha opinião, o mais importante é a personalidade.\"", options:["Por isso","Uma vez que","Além disso","Assim"], answer:3, explanation:"Assim = таким образом. Типичное начало вывода / заключения." },
  { cat:"contexto", q:"\"Não gosto deste filme. ___, vou sair do cinema.\"", options:["Apesar de","No entanto","Por isso","Uma vez que"], answer:2, explanation:"Por isso = поэтому. Выражает следствие из предыдущего." },
  { cat:"contexto", q:"\"Ela trabalha muito. ___, está sempre cansada.\"", options:["No entanto","Por isso","Apesar de","Além disso"], answer:1, explanation:"Por isso = поэтому. Причина (работает много) → следствие (всегда устаёт)." },
  { cat:"contexto", q:"\"Concordo com esta ideia. ___, há aspetos negativos.\"", options:["Por isso","Além disso","No entanto","Uma vez que"], answer:2, explanation:"No entanto = однако. Вводит контраргумент после согласия." },
  { cat:"contexto", q:"Qual palavra NÃO serve para introduzir uma conclusão?", options:["Assim","Por isso","Portanto","Uma vez que"], answer:3, explanation:"Uma vez que вводит причину, а не вывод. Для вывода: Assim, Por isso, Portanto, Em conclusão." },
  { cat:"contexto", q:"\"___, hoje em dia as pessoas dão muita importância ao aspeto físico.\"", options:["No entanto","Por outro lado","Na minha opinião","Além disso"], answer:2, explanation:"Na minha opinião = по моему мнению. Типичное начало введения в сочинении." },
  { cat:"contexto", q:"\"Não só os jovens ___ os adultos usam redes sociais.\"", options:["mas também","como","porém","assim"], answer:1, explanation:"Não só... como... = не только... но и... \"Não só os jovens como os adultos...\"" },
];
const labelMap = { traducao:"O que significa?", contexto:"No contexto" };
const classMap = { traducao:"badge-traducao", contexto:"badge-contexto" };
let current=0,score=0,answered=false,mistakes=[],shuffled=[];
function shuffle(arr){return[...arr].sort(()=>Math.random()-0.5);}
function start(){shuffled=shuffle(questions);current=0;score=0;answered=false;mistakes=[];document.getElementById('results').classList.remove('show');document.getElementById('quizCard').style.display='block';renderQuestion();}
function renderQuestion(){
  const q=shuffled[current],total=shuffled.length;
  document.getElementById('progressBar').style.width=(current/total*100)+'%';
  document.getElementById('progressLabel').textContent=`Questão ${current+1} de ${total}`;
  const badge=document.getElementById('badge');
  badge.textContent=labelMap[q.cat];badge.className='category-badge '+classMap[q.cat];
  document.getElementById('question').textContent=q.q;
  const optDiv=document.getElementById('options');optDiv.innerHTML='';
  const si=shuffle(q.options.map((_,i)=>i));const nc=si.indexOf(q.answer);
  si.forEach((oi,ni)=>{const btn=document.createElement('button');btn.className='option-btn';btn.textContent=q.options[oi];btn.onclick=()=>selectAnswer(ni,nc,q);optDiv.appendChild(btn);});
  document.getElementById('feedback').className='feedback';
  document.getElementById('nextBtn').className='next-btn';
  answered=false;
}
function selectAnswer(chosen,correct,q){
  if(answered)return;answered=true;
  const btns=document.querySelectorAll('.option-btn');btns.forEach(b=>b.disabled=true);
  btns[correct].classList.add('correct');
  const fb=document.getElementById('feedback');
  if(chosen===correct){score++;btns[chosen].classList.add('correct');fb.className='feedback ok show';fb.textContent='✓ Correto! '+q.explanation;}
  else{btns[chosen].classList.add('wrong');fb.className='feedback err show';fb.textContent='✗ Incorreto. '+q.explanation;mistakes.push({q:q.q,wrong:btns[chosen].textContent,right:q.options[q.answer]});}
  document.getElementById('nextBtn').className='next-btn show';
}
function nextQuestion(){current++;if(current>=shuffled.length)showResults();else renderQuestion();}
function showResults(){
  document.getElementById('quizCard').style.display='none';
  document.getElementById('progressBar').style.width='100%';
  const total=shuffled.length,pct=Math.round(score/total*100);
  document.getElementById('scoreNum').textContent=score;document.getElementById('scoreDenom').textContent='de '+total;
  const msgs=[['Não desistas!','Revê as palavras de ligação e tenta outra vez!'],['Continua!','Já conheces algumas, mas há espaço para melhorar.'],['Muito bem!','Bom resultado! Revê os erros abaixo.'],['Excelente!','Dominas os conectores muito bem!']];
  const m=msgs[pct>=90?3:pct>=70?2:pct>=50?1:0];
  document.getElementById('resultsTitle').textContent=m[0];document.getElementById('resultsMsg').textContent=`${pct}% correto. ${m[1]}`;
  const ml=document.getElementById('mistakesList');
  ml.innerHTML=mistakes.length>0?'<h3>Erros para rever:</h3>'+mistakes.map(m=>`<div class="mistake-item"><div>${m.q}</div><div>A tua resposta: <strong>${m.wrong}</strong> &nbsp;|&nbsp; Correto: <span class="correct-ans">${m.right}</span></div></div>`).join(''):'<p style="color:#276749;margin-top:16px">Sem erros! Perfeito!</p>';
  document.getElementById('results').classList.add('show');
}
function restart(){start();}
start();
</script>
</body>
</html>
