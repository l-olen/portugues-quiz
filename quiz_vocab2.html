<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz -- Vocabulário 2</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8; color: #2d3748; min-height: 100vh; padding: 20px; }
  .container { max-width: 680px; margin: 0 auto; }
  header { text-align: center; padding: 30px 0 20px; }
  header h1 { font-size: 1.8rem; color: #2c7a7b; margin-bottom: 6px; }
  header p { color: #718096; font-size: 0.95rem; }
  .back-link { display: inline-block; margin-bottom: 16px; color: #718096; font-size: 0.88rem; text-decoration: none; }
  .back-link:hover { color: #2c7a7b; }

  /* Mode toggle */
  .mode-wrap { display: flex; gap: 0; background: white; border-radius: 12px; padding: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); margin-bottom: 16px; }
  .mode-btn { flex: 1; padding: 9px 6px; border: none; background: transparent; border-radius: 9px; font-size: 0.82rem; font-weight: 600; cursor: pointer; color: #718096; transition: all 0.2s; line-height: 1.3; }
  .mode-btn.active { background: #2c7a7b; color: white; }

  /* Filter */
  .filter-wrap { margin-bottom: 16px; }
  .filter-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #a0aec0; margin-bottom: 8px; display: block; }
  .filter-buttons { display: flex; flex-wrap: wrap; gap: 7px; }
  .filter-btn { font-size: 0.78rem; font-weight: 600; padding: 5px 12px; border-radius: 20px; border: 2px solid #e2e8f0; cursor: pointer; background: white; color: #4a5568; transition: all 0.15s; }
  .filter-btn.active-f { border-color: currentColor; }
  .filter-btn[data-cat="Todos"].active-f      { background: #edf2f7; color: #4a5568; }
  .filter-btn[data-cat="Natureza"].active-f   { background: #f0fff4; color: #276749; }
  .filter-btn[data-cat="Ações"].active-f      { background: #ebf8ff; color: #2b6cb0; }
  .filter-btn[data-cat="Adjetivos"].active-f  { background: #faf5ff; color: #6b46c1; }
  .filter-btn[data-cat="Comida"].active-f     { background: #fffaf0; color: #c05621; }
  .filter-btn[data-cat="Corpo"].active-f      { background: #fff5f7; color: #97266d; }
  .filter-btn[data-cat="Expressões"].active-f { background: #e6fffa; color: #2c7a7b; }

  /* Progress */
  .progress-bar-wrap { background: #e2e8f0; border-radius: 8px; height: 8px; margin: 16px 0 4px; }
  .progress-bar { height: 8px; border-radius: 8px; background: linear-gradient(90deg, #2c7a7b, #81e6d9); transition: width 0.4s; }
  .progress-label { text-align: right; font-size: 0.82rem; color: #718096; margin-top: 4px; margin-bottom: 16px; }

  /* Card */
  .card { background: white; border-radius: 16px; padding: 28px 30px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 20px; }
  .category-badge { display: inline-block; font-size: 0.73rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; padding: 3px 10px; border-radius: 20px; margin-bottom: 14px; }
  .badge-nat   { background: #f0fff4; color: #276749; }
  .badge-acao  { background: #ebf8ff; color: #2b6cb0; }
  .badge-adj   { background: #faf5ff; color: #6b46c1; }
  .badge-com   { background: #fffaf0; color: #c05621; }
  .badge-corp  { background: #fff5f7; color: #97266d; }
  .badge-expr  { background: #e6fffa; color: #2c7a7b; }

  /* Choice mode */
  .question { font-size: 1.1rem; font-weight: 600; line-height: 1.6; margin-bottom: 20px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn { background: #f7fafc; border: 2px solid #e2e8f0; border-radius: 10px; padding: 13px 18px; font-size: 1rem; text-align: left; cursor: pointer; transition: all 0.15s; color: #2d3748; }
  .option-btn:hover:not(:disabled) { background: #e6fffa; border-color: #81e6d9; }
  .option-btn.correct { background: #f0fff4; border-color: #68d391; color: #276749; font-weight: 600; }
  .option-btn.wrong   { background: #fff5f5; border-color: #fc8181; color: #c53030; }
  .option-btn:disabled { cursor: default; }

  /* Write mode (RU → PT) */
  .ru-display { font-size: 1.6rem; font-weight: 700; color: #2d3748; margin-bottom: 4px; }
  .ru-hint-line { font-size: 0.83rem; color: #a0aec0; margin-bottom: 22px; }
  .write-prompt { font-size: 0.88rem; color: #718096; margin-bottom: 10px; }
  .write-row { display: flex; gap: 10px; }
  .write-input { flex: 1; padding: 13px 16px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 1.05rem; font-family: inherit; color: #2d3748; outline: none; transition: border-color 0.15s; }
  .write-input:focus { border-color: #81e6d9; }
  .write-input.correct-inp { border-color: #68d391; background: #f0fff4; }
  .write-input.wrong-inp   { border-color: #fc8181; background: #fff5f5; }
  .check-btn { padding: 13px 20px; background: #2c7a7b; color: white; border: none; border-radius: 10px; font-size: 0.95rem; font-weight: 600; cursor: pointer; }
  .check-btn:hover { background: #285e61; }
  .check-btn:disabled { background: #a0aec0; cursor: default; }

  /* Frase mode */
  .sentence-display { font-size: 1.05rem; font-weight: 500; line-height: 1.9; margin-bottom: 6px; color: #2d3748; }
  .sentence-blank { display: inline-block; min-width: 100px; border-bottom: 3px solid #2c7a7b; color: #2c7a7b; font-weight: 700; text-align: center; padding: 0 4px; vertical-align: bottom; }
  .frase-hint { font-size: 0.83rem; color: #a0aec0; margin-bottom: 18px; }
  .frase-hint span { color: #718096; font-style: italic; }

  /* Feedback */
  .feedback { margin-top: 16px; padding: 12px 16px; border-radius: 10px; font-size: 0.9rem; line-height: 1.5; display: none; }
  .feedback.show { display: block; }
  .feedback.ok  { background: #f0fff4; color: #276749; border-left: 4px solid #68d391; }
  .feedback.err { background: #fff5f5; color: #c53030; border-left: 4px solid #fc8181; }

  .next-btn { display: none; margin-top: 18px; width: 100%; padding: 14px; background: #2c7a7b; color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; }
  .next-btn:hover { background: #285e61; }
  .next-btn.show { display: block; }

  /* No sentence notice */
  .no-sentence { text-align: center; color: #a0aec0; font-size: 0.9rem; padding: 40px 0; }

  /* Results */
  .results { display: none; text-align: center; padding: 40px 30px; }
  .results.show { display: block; }
  .score-circle { width: 120px; height: 120px; border-radius: 50%; background: linear-gradient(135deg, #2c7a7b, #81e6d9); display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 20px; color: white; }
  .score-circle .num { font-size: 2.2rem; font-weight: 700; line-height: 1; }
  .score-circle .denom { font-size: 0.85rem; opacity: 0.85; }
  .results h2 { font-size: 1.5rem; margin-bottom: 8px; }
  .results p { color: #718096; margin-bottom: 24px; }
  .btn-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .restart-btn { padding: 13px 32px; background: #2c7a7b; color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; }
  .home-btn { padding: 13px 32px; background: #edf2f7; color: #4a5568; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; text-decoration: none; display: inline-block; cursor: pointer; }
  .mistakes-list { text-align: left; margin-top: 28px; }
  .mistakes-list h3 { font-size: 1rem; color: #c53030; margin-bottom: 12px; }
  .mistake-item { background: #fff5f5; border-radius: 10px; padding: 12px 16px; margin-bottom: 8px; font-size: 0.88rem; line-height: 1.5; }
  .mistake-item .mq { font-weight: 600; color: #2d3748; margin-bottom: 3px; }
  .mistake-item .ma { color: #276749; }

  footer { text-align: center; padding: 32px 0 20px; font-size: 0.8rem; color: #cbd5e0; }
</style>
</head>
<body>
<div class="container">

  <a class="back-link" href="index.html">← Voltar ao menu</a>
  <header>
    <h1>Vocabulário 2</h1>
    <p>Açores · Natureza · Corpo · Expressões · 65 palavras</p>
  </header>

  <div class="mode-wrap">
    <button class="mode-btn active" id="btnChoice" onclick="setMode('choice')">Escolher<br><small style="font-weight:400;opacity:.8">RU варианты</small></button>
    <button class="mode-btn" id="btnWrite" onclick="setMode('write')">Escrever<br><small style="font-weight:400;opacity:.8">RU → пиши PT</small></button>
    <button class="mode-btn" id="btnFrase" onclick="setMode('frase')">Frase<br><small style="font-weight:400;opacity:.8">вставь в предложение</small></button>
  </div>

  <div class="filter-wrap">
    <span class="filter-label">Tema</span>
    <div class="filter-buttons">
      <button class="filter-btn active-f" data-cat="Todos" onclick="setFilter('Todos',this)">Todos</button>
      <button class="filter-btn" data-cat="Natureza" onclick="setFilter('Natureza',this)">Natureza</button>
      <button class="filter-btn" data-cat="Ações" onclick="setFilter('Ações',this)">Ações</button>
      <button class="filter-btn" data-cat="Adjetivos" onclick="setFilter('Adjetivos',this)">Adjetivos</button>
      <button class="filter-btn" data-cat="Comida" onclick="setFilter('Comida',this)">Comida e animais</button>
      <button class="filter-btn" data-cat="Corpo" onclick="setFilter('Corpo',this)">Corpo e saúde</button>
      <button class="filter-btn" data-cat="Expressões" onclick="setFilter('Expressões',this)">Expressões</button>
    </div>
  </div>

  <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
  <div class="progress-label" id="progressLabel">1 / ?</div>

  <div class="card" id="quizCard">
    <span class="category-badge" id="catBadge"></span>

    <!-- Choice mode -->
    <div id="choiceArea">
      <div class="question" id="questionText"></div>
      <div class="options" id="optionsDiv"></div>
    </div>

    <!-- Write mode: RU → type PT -->
    <div id="writeArea" style="display:none">
      <div class="ru-display" id="ruDisplay"></div>
      <div class="ru-hint-line" id="ruHintLine"></div>
      <div class="write-prompt">Escreve em português:</div>
      <div class="write-row">
        <input type="text" class="write-input" id="writeInput" placeholder="português..." autocomplete="off" autocorrect="off" spellcheck="false">
        <button class="check-btn" id="checkBtnW" onclick="checkWrite()">OK</button>
      </div>
    </div>

    <!-- Frase mode: sentence with blank -->
    <div id="fraseArea" style="display:none">
      <div class="sentence-display" id="sentenceDisplay"></div>
      <div class="frase-hint" id="fraseHint"></div>
      <div class="write-row">
        <input type="text" class="write-input" id="fraseInput" placeholder="palavra em português..." autocomplete="off" autocorrect="off" spellcheck="false">
        <button class="check-btn" id="checkBtnF" onclick="checkFrase()">OK</button>
      </div>
    </div>

    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Próxima →</button>
  </div>

  <div class="card results" id="resultsCard">
    <div class="score-circle"><div class="num" id="scoreNum">0</div><div class="denom" id="scoreDenom">/ 0</div></div>
    <h2 id="resultTitle"></h2>
    <p id="resultMsg"></p>
    <div class="btn-row">
      <button class="restart-btn" onclick="restart()">Recomeçar</button>
      <a class="home-btn" href="index.html">Menu</a>
    </div>
    <div class="mistakes-list" id="mistakesList"></div>
  </div>

</div>
<footer>Português Europeu (PE) · Nível A2–B1</footer>

<script>
// q = shown in choice mode; answers = RU translations (display in write mode)
// ptAnswers = accepted PT answers in write mode
// sentence = sentence with ___ blank (null if not available)
// sentenceAnswers = accepted PT answers for sentence blank
const allQ = [
  // NATUREZA
  { cat:"Natureza", badge:"badge-nat", q:"passear", hint:"v.", answers:["гулять","прогуливаться"], options:["гулять","бегать","плавать","ехать"], answer:0, ptAnswers:["passear"], sentence:"No fim de semana gostamos de ___ no parque.", sentenceAnswers:["passear"], explanation:"Passear = гулять. Ex.: Gosto de passear no parque ao fim de semana." },
  { cat:"Natureza", badge:"badge-nat", q:"percorrer", hint:"v.", answers:["проходить","проезжать","объезжать"], options:["проходить/проезжать","останавливаться","возвращаться","подниматься"], answer:0, ptAnswers:["percorrer"], sentence:"Vamos ___ toda a ilha de bicicleta.", sentenceAnswers:["percorrer"], explanation:"Percorrer = проходить, объезжать расстояние. Ex.: Percorremos 20 km a pé." },
  { cat:"Natureza", badge:"badge-nat", q:"serra", hint:"f.", answers:["горная цепь","горы"], options:["горная цепь","пустыня","побережье","равнина"], answer:0, ptAnswers:["serra"], sentence:"Subimos à ___ da Estrela no inverno.", sentenceAnswers:["serra"], explanation:"Serra = горная цепь. Ex.: A Serra da Estrela é a montanha mais alta de Portugal." },
  { cat:"Natureza", badge:"badge-nat", q:"lagoas", hint:"f.pl. → lagoa", answers:["озёра","лагуны","озеро","лагуна"], options:["озёра/лагуны","реки","моря","болота"], answer:0, ptAnswers:["lagoas","lagoa"], sentence:"As ___ dos Açores têm origem vulcânica.", sentenceAnswers:["lagoas"], explanation:"Lagoa = озеро или лагуна. Ex.: As lagoas dos Açores são de origem vulcânica." },
  { cat:"Natureza", badge:"badge-nat", q:"crateras", hint:"f.pl. → cratera", answers:["кратеры","кратер"], options:["кратеры","пещеры","горы","острова"], answer:0, ptAnswers:["crateras","cratera"], sentence:"As ___ estão cheias de água quente.", sentenceAnswers:["crateras"], explanation:"Cratera = кратер. Ex.: As crateras dos Açores são espetaculares." },
  { cat:"Natureza", badge:"badge-nat", q:"furnas", hint:"f.pl. → furna", answers:["пещеры","гроты"], options:["пещеры/гроты","кратеры","лагуны","водопады"], answer:0, ptAnswers:["furnas","furna"], sentence:"Visitámos as ___ da ilha e vimos fontes quentes.", sentenceAnswers:["furnas"], explanation:"Furna = пещера, грот. Furnas — место на Азорских островах с горячими источниками." },
  { cat:"Natureza", badge:"badge-nat", q:"fogueira", hint:"f.", answers:["костёр","костер"], options:["костёр","лампа","свеча","факел"], answer:0, ptAnswers:["fogueira"], sentence:"Fizemos uma ___ na praia e assámos peixe.", sentenceAnswers:["fogueira"], explanation:"Fogueira = костёр. Ex.: Fizemos uma fogueira na praia à noite." },
  { cat:"Natureza", badge:"badge-nat", q:"ao relento", hint:"выражение", answers:["под открытым небом","под росой"], options:["под открытым небом","в тени","у костра","в лесу"], answer:0, ptAnswers:["ao relento","relento"], sentence:"Durante a viagem dormiram ___.", sentenceAnswers:["ao relento"], explanation:"Ao relento = под открытым небом. Ex.: Dormir ao relento = спать под открытым небом." },
  { cat:"Natureza", badge:"badge-nat", q:"ervas", hint:"f.pl. → erva", answers:["травы","трава","зелень"], options:["травы","цветы","деревья","кусты"], answer:0, ptAnswers:["ervas","erva"], sentence:"Fizeram um chá de ___ aromáticas.", sentenceAnswers:["ervas"], explanation:"Erva = трава. Ervas aromáticas = ароматные травы. Chá de ervas = травяной чай." },
  { cat:"Natureza", badge:"badge-nat", q:"girassol", hint:"m.", answers:["подсолнух","подсолнечник"], options:["подсолнух","тюльпан","ромашка","роза"], answer:0, ptAnswers:["girassol"], sentence:"Plantei um ___ no jardim e cresceu muito alto.", sentenceAnswers:["girassol"], explanation:"Girassol = подсолнух. Ex.: Os campos de girassóis são lindos no verão." },
  { cat:"Natureza", badge:"badge-nat", q:"cardume", hint:"m.", answers:["косяк рыб","стая рыб"], options:["косяк рыб","стая птиц","стадо","рой пчёл"], answer:0, ptAnswers:["cardume"], sentence:"Vimos um ___ enorme no fundo do mar.", sentenceAnswers:["cardume"], explanation:"Cardume = косяк рыб. Ex.: Vimos um cardume enorme no fundo do mar." },
  { cat:"Natureza", badge:"badge-nat", q:"alcateia", hint:"f.", answers:["волчья стая","стая волков"], options:["волчья стая","рой пчёл","косяк рыб","стадо коров"], answer:0, ptAnswers:["alcateia"], sentence:"A ___ caçava em grupo durante a noite.", sentenceAnswers:["alcateia"], explanation:"Alcateia = стая волков. Ex.: A alcateia caçava durante a noite." },
  // ACOES
  { cat:"Ações", badge:"badge-acao", q:"subir", hint:"v.", answers:["подниматься","взбираться"], options:["подниматься","спускаться","гулять","бегать"], answer:0, ptAnswers:["subir"], sentence:"Temos de ___ até ao cume da montanha.", sentenceAnswers:["subir"], explanation:"Subir = подниматься. Ex.: Subimos a serra a pé. / O preço subiu = цена поднялась." },
  { cat:"Ações", badge:"badge-acao", q:"seguir", hint:"v.", answers:["следовать","продолжать","идти за"], options:["следовать/продолжать","остановиться","вернуться","подниматься"], answer:0, ptAnswers:["seguir"], sentence:"Vamos ___ em frente até ao semáforo.", sentenceAnswers:["seguir"], explanation:"Seguir = следовать, продолжать. Ex.: Segue em frente = иди прямо." },
  { cat:"Ações", badge:"badge-acao", q:"sonhar", hint:"v.", answers:["мечтать","видеть сны","грезить"], options:["мечтать/видеть сны","думать","смотреть","слушать"], answer:0, ptAnswers:["sonhar"], sentence:"Ela adora ___ com viagens a países distantes.", sentenceAnswers:["sonhar"], explanation:"Sonhar = мечтать или видеть сны. Ex.: Sonhei contigo = я видел(а) тебя во сне." },
  { cat:"Ações", badge:"badge-acao", q:"adormecer", hint:"v.", answers:["засыпать","заснуть"], options:["засыпать","просыпаться","спать","мечтать"], answer:0, ptAnswers:["adormecer"], sentence:"O bebé começou a ___ no colo da mãe.", sentenceAnswers:["adormecer"], explanation:"Adormecer = засыпать. Ex.: Ele adormeceu no sofá = он заснул на диване." },
  { cat:"Ações", badge:"badge-acao", q:"regressou", hint:"v. → regressar", answers:["вернулся","вернулась","возвращаться"], options:["вернулся/ась","ушёл","уехал","прибыл"], answer:0, ptAnswers:["regressou","regressar"], sentence:"Ela ___ de Lisboa ontem à tarde.", sentenceAnswers:["regressou"], explanation:"Regressar = возвращаться. Regressou = он/она вернулся/ась (PPS)." },
  { cat:"Ações", badge:"badge-acao", q:"atravessar", hint:"v.", answers:["пересекать","перейти","переходить"], options:["пересекать","объезжать","подниматься","следовать"], answer:0, ptAnswers:["atravessar"], sentence:"Cuidado ao ___ a estrada com trânsito!", sentenceAnswers:["atravessar"], explanation:"Atravessar = пересекать. Ex.: Atravessar a rua = перейти улицу." },
  { cat:"Ações", badge:"badge-acao", q:"agitar", hint:"v.", answers:["трясти","взбалтывать","волновать"], options:["трясти/взбалтывать","бросать","толкать","класть"], answer:0, ptAnswers:["agitar"], sentence:"É preciso ___ bem a garrafa antes de usar.", sentenceAnswers:["agitar"], explanation:"Agitar = трясти, взбалтывать. Ex.: Agitar antes de usar = взбалтывать перед употреблением." },
  { cat:"Ações", badge:"badge-acao", q:"empurrar", hint:"v.", answers:["толкать","пихать"], options:["толкать","тянуть","бросать","поднимать"], answer:0, ptAnswers:["empurrar"], sentence:"Para abrir esta porta, deves ___ com força.", sentenceAnswers:["empurrar"], explanation:"Empurrar = толкать. Oposto: puxar = тянуть. Ex.: Empurra a porta = толкни дверь." },
  { cat:"Ações", badge:"badge-acao", q:"colocar", hint:"v.", answers:["класть","ставить","размещать"], options:["класть/ставить","брать","убирать","бросать"], answer:0, ptAnswers:["colocar"], sentence:"Podes ___ o livro na prateleira, por favor?", sentenceAnswers:["colocar"], explanation:"Colocar = класть, ставить. Синоним: pôr. Ex.: Coloca o livro na mesa." },
  { cat:"Ações", badge:"badge-acao", q:"aconteceu", hint:"v. → acontecer", answers:["случилось","произошло"], options:["случилось","началось","закончилось","изменилось"], answer:0, ptAnswers:["aconteceu","acontecer"], sentence:"— O que ___? — Caí e magoei o joelho.", sentenceAnswers:["aconteceu"], explanation:"Acontecer = случаться. Aconteceu = случилось (PPS). Ex.: O que aconteceu? = Что случилось?" },

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

// Normalize: lowercase, trim, remove accents for lenient comparison
function norm(s) {
  return s.toLowerCase().trim()
    .replace(/[àáâã]/g,'a').replace(/[éê]/g,'e').replace(/[íî]/g,'i')
    .replace(/[óôõ]/g,'o').replace(/[úû]/g,'u').replace(/ç/g,'c');
}

function matchPT(input, accepted) {
  const ni = norm(input);
  return accepted.some(a => {
    const na = norm(a);
    return na === ni || (ni.length >= 4 && (na.startsWith(ni) || ni.startsWith(na)));
  });
}

let mode = 'choice';
let activeFilter = 'Todos';
let questions = [];
let current = 0;
let score = 0;
let mistakes = [];
let answered = false;
let shuffledOpts = [];

function setMode(m) {
  mode = m;
  ['choice','write','frase'].forEach(id => {
    document.getElementById('btn' + id.charAt(0).toUpperCase() + id.slice(1)).classList.toggle('active', m === id);
  });
  restart();
}

function setFilter(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active-f'));
  btn.classList.add('active-f');
  restart();
}

function restart() {
  let pool = activeFilter === 'Todos' ? allQ : allQ.filter(q => q.cat === activeFilter);
  if (mode === 'frase') pool = pool.filter(q => q.sentence);
  questions = shuffle(pool);
  current = 0; score = 0; mistakes = [];
  document.getElementById('quizCard').style.display = 'block';
  document.getElementById('resultsCard').classList.remove('show');
  showQuestion();
}

function showQuestion() {
  if (current >= questions.length) { showResults(); return; }
  const q = questions[current];
  answered = false;

  document.getElementById('progressBar').style.width = (current / questions.length * 100) + '%';
  document.getElementById('progressLabel').textContent = (current + 1) + ' / ' + questions.length;

  const badge = document.getElementById('catBadge');
  badge.textContent = q.cat;
  badge.className = 'category-badge ' + q.badge;

  const fb = document.getElementById('feedback');
  fb.className = 'feedback'; fb.textContent = '';
  document.getElementById('nextBtn').classList.remove('show');

  document.getElementById('choiceArea').style.display = 'none';
  document.getElementById('writeArea').style.display = 'none';
  document.getElementById('fraseArea').style.display = 'none';

  if (mode === 'choice') {
    document.getElementById('choiceArea').style.display = 'block';
    document.getElementById('questionText').textContent = '«' + q.q + '» em russo:';
    const indexed = q.options.map((opt, i) => ({ opt, correct: i === q.answer }));
    shuffledOpts = shuffle(indexed);
    const div = document.getElementById('optionsDiv');
    div.innerHTML = '';
    shuffledOpts.forEach((item, i) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = item.opt;
      btn.onclick = () => checkChoice(i, btn);
      div.appendChild(btn);
    });

  } else if (mode === 'write') {
    document.getElementById('writeArea').style.display = 'block';
    document.getElementById('ruDisplay').textContent = q.answers[0];
    document.getElementById('ruHintLine').textContent = q.hint + (q.answers.length > 1 ? '  ·  ' + q.answers.slice(1).join(' / ') : '');
    const inp = document.getElementById('writeInput');
    inp.value = ''; inp.className = 'write-input'; inp.disabled = false;
    document.getElementById('checkBtnW').disabled = false;
    setTimeout(() => inp.focus(), 50);

  } else { // frase
    document.getElementById('fraseArea').style.display = 'block';
    const parts = q.sentence.split('___');
    const sd = document.getElementById('sentenceDisplay');
    sd.innerHTML = '';
    const before = document.createTextNode(parts[0]);
    const blank = document.createElement('span');
    blank.className = 'sentence-blank';
    blank.textContent = '___';
    blank.id = 'blankSpan';
    const after = document.createTextNode(parts[1] || '');
    sd.appendChild(before); sd.appendChild(blank); sd.appendChild(after);
    document.getElementById('fraseHint').innerHTML = 'Tradução: <span>' + q.answers[0] + '</span>  ·  ' + q.hint;
    const inp = document.getElementById('fraseInput');
    inp.value = ''; inp.className = 'write-input'; inp.disabled = false;
    document.getElementById('checkBtnF').disabled = false;
    setTimeout(() => inp.focus(), 50);
  }
}

function checkChoice(idx, btn) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  document.querySelectorAll('.option-btn').forEach((b, i) => {
    b.disabled = true;
    if (shuffledOpts[i].correct) b.classList.add('correct');
  });
  const fb = document.getElementById('feedback');
  if (shuffledOpts[idx].correct) {
    score++; btn.classList.add('correct');
    fb.className = 'feedback ok show';
    fb.textContent = 'Correto! ' + q.explanation;
  } else {
    btn.classList.add('wrong');
    fb.className = 'feedback err show';
    fb.textContent = 'Errado. ' + q.explanation;
    mistakes.push({ q: q.q, explanation: q.explanation });
  }
  showNext();
}

function checkWrite() {
  if (answered) return;
  const q = questions[current];
  const inp = document.getElementById('writeInput');
  const raw = inp.value.trim();
  if (!raw) return;
  answered = true; inp.disabled = true;
  document.getElementById('checkBtnW').disabled = true;
  const correct = matchPT(raw, q.ptAnswers);
  const fb = document.getElementById('feedback');
  if (correct) {
    score++; inp.className = 'write-input correct-inp';
    fb.className = 'feedback ok show';
    fb.textContent = 'Correto! ' + q.explanation;
  } else {
    inp.className = 'write-input wrong-inp';
    fb.className = 'feedback err show';
    fb.textContent = 'Resposta: ' + q.ptAnswers[0] + '. ' + q.explanation;
    mistakes.push({ q: q.answers[0] + ' → ?', explanation: q.ptAnswers[0] + ' — ' + q.explanation });
  }
  showNext();
}

function checkFrase() {
  if (answered) return;
  const q = questions[current];
  const inp = document.getElementById('fraseInput');
  const raw = inp.value.trim();
  if (!raw) return;
  answered = true; inp.disabled = true;
  document.getElementById('checkBtnF').disabled = true;
  const correct = matchPT(raw, q.sentenceAnswers);
  // Show filled sentence
  const blank = document.getElementById('blankSpan');
  if (blank) { blank.textContent = correct ? raw : q.sentenceAnswers[0]; blank.style.borderColor = correct ? '#68d391' : '#fc8181'; blank.style.color = correct ? '#276749' : '#c53030'; }
  const fb = document.getElementById('feedback');
  if (correct) {
    score++; inp.className = 'write-input correct-inp';
    fb.className = 'feedback ok show';
    fb.textContent = 'Correto! ' + q.explanation;
  } else {
    inp.className = 'write-input wrong-inp';
    fb.className = 'feedback err show';
    fb.textContent = 'Resposta: «' + q.sentenceAnswers[0] + '». ' + q.explanation;
    mistakes.push({ q: q.sentence.replace('___', '___'), explanation: q.sentenceAnswers[0] + ' — ' + q.explanation });
  }
  showNext();
}

function showNext() {
  const nb = document.getElementById('nextBtn');
  nb.classList.add('show');
  nb.textContent = current < questions.length - 1 ? 'Próxima →' : 'Ver resultados →';
}

function nextQuestion() { current++; showQuestion(); }

function showResults() {
  document.getElementById('progressBar').style.width = '100%';
  document.getElementById('quizCard').style.display = 'none';
  document.getElementById('resultsCard').classList.add('show');
  document.getElementById('scoreNum').textContent = score;
  document.getElementById('scoreDenom').textContent = '/ ' + questions.length;
  const pct = Math.round(score / questions.length * 100);
  const m = pct >= 90 ? ['Excelente!','Vocabulário dominado!'] : pct >= 70 ? ['Muito bem!','Só mais um pouco.'] : pct >= 50 ? ['Bom esforço!','Continua a praticar.'] : ['Continua!','Revê as palavras.'];
  document.getElementById('resultTitle').textContent = m[0];
  document.getElementById('resultMsg').textContent = pct + '% correto. ' + m[1];
  const ml = document.getElementById('mistakesList');
  ml.innerHTML = mistakes.length ? '<h3>Rever (' + mistakes.length + '):</h3>' + mistakes.map(e => '<div class="mistake-item"><div class="mq">' + e.q + '</div><div class="ma">' + e.explanation + '</div></div>').join('') : '';
}

document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (!answered) {
    if (mode === 'write') checkWrite();
    else if (mode === 'frase') checkFrase();
  } else {
    const nb = document.getElementById('nextBtn');
    if (nb.classList.contains('show')) nextQuestion();
  }
});

restart();
</script>
</body>
</html>
