<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz -- Artigos</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8; color: #2d3748; min-height: 100vh; padding: 20px; }
  .container { max-width: 680px; margin: 0 auto; }
  header { text-align: center; padding: 30px 0 20px; }
  header h1 { font-size: 1.8rem; color: #2b6cb0; margin-bottom: 6px; }
  header p { color: #718096; font-size: 0.95rem; }
  .back-link { display: inline-block; margin-bottom: 16px; color: #718096; font-size: 0.88rem; text-decoration: none; }
  .back-link:hover { color: #2b6cb0; }
  .progress-bar-wrap { background: #e2e8f0; border-radius: 8px; height: 8px; margin: 20px 0; }
  .progress-bar { height: 8px; border-radius: 8px; background: linear-gradient(90deg, #3182ce, #63b3ed); transition: width 0.4s ease; }
  .progress-label { text-align: right; font-size: 0.82rem; color: #718096; margin-top: 4px; }
  .card { background: white; border-radius: 16px; padding: 30px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 20px; }
  .category-badge { display: inline-block; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; padding: 3px 10px; border-radius: 20px; margin-bottom: 14px; background: #ebf8ff; color: #2b6cb0; }
  .question { font-size: 1.15rem; font-weight: 600; line-height: 1.5; margin-bottom: 20px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn { background: #f7fafc; border: 2px solid #e2e8f0; border-radius: 10px; padding: 13px 18px; font-size: 1rem; text-align: left; cursor: pointer; transition: all 0.15s ease; color: #2d3748; }
  .option-btn:hover:not(:disabled) { background: #ebf8ff; border-color: #90cdf4; }
  .option-btn.correct { background: #f0fff4; border-color: #68d391; color: #276749; font-weight: 600; }
  .option-btn.wrong { background: #fff5f5; border-color: #fc8181; color: #c53030; }
  .option-btn:disabled { cursor: default; }
  .feedback { margin-top: 16px; padding: 12px 16px; border-radius: 10px; font-size: 0.9rem; line-height: 1.5; display: none; }
  .feedback.show { display: block; }
  .feedback.ok { background: #f0fff4; color: #276749; border-left: 4px solid #68d391; }
  .feedback.err { background: #fff5f5; color: #c53030; border-left: 4px solid #fc8181; }
  .next-btn { display: none; margin-top: 18px; width: 100%; padding: 14px; background: #3182ce; color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.15s; }
  .next-btn:hover { background: #2b6cb0; }
  .next-btn.show { display: block; }
  .results { display: none; text-align: center; padding: 40px 30px; }
  .results.show { display: block; }
  .score-circle { width: 120px; height: 120px; border-radius: 50%; background: linear-gradient(135deg, #3182ce, #63b3ed); display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 20px; color: white; }
  .score-circle .num { font-size: 2.2rem; font-weight: 700; line-height: 1; }
  .score-circle .denom { font-size: 0.85rem; opacity: 0.85; }
  .results h2 { font-size: 1.5rem; margin-bottom: 8px; color: #2d3748; }
  .results p { color: #718096; margin-bottom: 24px; }
  .btn-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .restart-btn { padding: 13px 32px; background: #3182ce; color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.15s; }
  .restart-btn:hover { background: #2b6cb0; }
  .home-btn { padding: 13px 32px; background: #edf2f7; color: #4a5568; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.15s; text-decoration: none; display: inline-block; }
  .home-btn:hover { background: #e2e8f0; }
  .mistakes-list { text-align: left; margin-top: 28px; }
  .mistakes-list h3 { font-size: 1rem; color: #c53030; margin-bottom: 12px; }
  .mistake-item { background: #fff5f5; border-radius: 8px; padding: 10px 14px; margin-bottom: 8px; font-size: 0.88rem; line-height: 1.5; }
  .mistake-item strong { color: #c53030; }
  .mistake-item .correct-ans { color: #276749; font-weight: 600; }
  @media (max-width: 480px) { .card { padding: 20px; } header h1 { font-size: 1.4rem; } .question { font-size: 1rem; } }
</style>
</head>
<body>
<div class="container">

  <a class="back-link" href="index.html">← Voltar ao menu</a>

  <header>
    <h1>Artigos</h1>
    <p>Definidos, indefinidos e contrações com preposições</p>
  </header>

  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>
  <div class="progress-label" id="progressLabel"></div>

  <div class="card" id="quizCard">
    <div class="category-badge" id="badge">Artigos</div>
    <div class="question" id="question"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Próxima questão →</button>
  </div>

  <div class="card results" id="results">
    <div class="score-circle">
      <span class="num" id="scoreNum"></span>
      <span class="denom" id="scoreDenom"></span>
    </div>
    <h2 id="resultsTitle"></h2>
    <p id="resultsMsg"></p>
    <div class="btn-row">
      <button class="restart-btn" onclick="restart()">Repetir quiz</button>
      <a class="home-btn" href="index.html">Menu principal</a>
    </div>
    <div class="mistakes-list" id="mistakesList"></div>
  </div>

</div>
<script>
const questions = [
  {
    q: "Qual é o artigo correto? ___ livro está na mesa.",
    options: ["a", "o", "um", "os"],
    answer: 1,
    explanation: "\"Livro\" é masculino singular → artigo definido \"o\"."
  },
  {
    q: "Qual é o artigo correto? Eu tenho ___ gata muito bonita.",
    options: ["a", "uma", "umas", "as"],
    answer: 1,
    explanation: "Primeira menção → artigo indefinido. Feminino singular → \"uma\"."
  },
  {
    q: "Completa: Eu gosto ___ livros de aventura.",
    options: ["de os", "dos", "das", "do"],
    answer: 1,
    explanation: "de + os = \"dos\". Contração obrigatória em português."
  },
  {
    q: "Completa: Ela está ___ escola.",
    options: ["em a", "na", "no", "à"],
    answer: 1,
    explanation: "em + a = \"na\". Contração obrigatória."
  },
  {
    q: "Qual frase está correta?",
    options: ["Maria está em casa.", "A Maria está em casa.", "Uma Maria está em casa.", "O Maria está em casa."],
    answer: 1,
    explanation: "Em PE (português europeu) usa-se artigo definido com nomes próprios: \"A Maria\"."
  },
  {
    q: "Completa: Vou ___ supermercado.",
    options: ["a o", "ao", "à", "na"],
    answer: 1,
    explanation: "a + o = \"ao\". Contração obrigatória."
  },
  {
    q: "Qual frase está correta?",
    options: ["Vou a o Brasil.", "Vou ao Brasil.", "Vou no Brasil.", "Vou para o Brasil nas férias."],
    answer: 1,
    explanation: "a + o = \"ao\". \"Vou ao Brasil\" está correto."
  },
  {
    q: "Como se diz corretamente em português europeu?",
    options: ["Vou a Portugal.", "Vou ao Portugal.", "Vou para Portugal.", "Vou em Portugal."],
    answer: 0,
    explanation: "Portugal não usa artigo → só \"a\" (sem contração): \"Vou a Portugal\"."
  },
  {
    q: "Como se diz corretamente?",
    options: ["Ela é de a Alemanha.", "Ela é da Alemanha.", "Ela é de Alemanha.", "Ela é do Alemanha."],
    answer: 1,
    explanation: "A Alemanha usa artigo definido → de + a = \"da\": \"Ela é da Alemanha\"."
  },
  {
    q: "Como se diz corretamente?",
    options: ["Ele é de o Brasil.", "Ele é de Brasil.", "Ele é do Brasil.", "Ele é no Brasil."],
    answer: 2,
    explanation: "O Brasil usa artigo → de + o = \"do\": \"Ele é do Brasil\"."
  },
  {
    q: "Qual frase está ERRADA?",
    options: ["Ela é de Portugal.", "Ele é do Brasil.", "Eles são da Rússia.", "Nós somos do Portugal."],
    answer: 3,
    explanation: "Portugal não usa artigo → \"do Portugal\" está errado. Correto: \"de Portugal\"."
  },
  {
    q: "Qual é o artigo correto? ___ primavera é linda.",
    options: ["Um", "Uma", "A", "O"],
    answer: 2,
    explanation: "Estações do ano usam artigo definido. \"Primavera\" é feminino → \"A primavera\"."
  },
  {
    q: "Completa: Eu gosto ___ trabalho dele.",
    options: ["de o", "do", "da", "no"],
    answer: 1,
    explanation: "de + o = \"do\". Contração obrigatória."
  },
  {
    q: "As crianças brincam ___ parque.",
    options: ["em o", "no", "na", "ao"],
    answer: 1,
    explanation: "em + o = \"no\". Contração obrigatória."
  },
  {
    q: "Completa: Ela veio ___ Portugal.",
    options: ["do", "de", "da", "no"],
    answer: 1,
    explanation: "Portugal não usa artigo → só \"de\" (sem contração): \"de Portugal\"."
  },
  {
    q: "Qual é o artigo indefinido correto? Eu quero ___ café.",
    options: ["o", "a", "um", "uma"],
    answer: 2,
    explanation: "\"Café\" é masculino → artigo indefinido \"um\"."
  },
  {
    q: "Completa: Fui ___ médico ontem.",
    options: ["a o", "ao", "no", "à"],
    answer: 1,
    explanation: "a + o = \"ao\". \"Fui ao médico\"."
  },
  {
    q: "Completa: Vou ___ farmácia.",
    options: ["ao", "à", "na", "a a"],
    answer: 1,
    explanation: "a + a = \"à\". \"Vou à farmácia\"."
  }
];

let current = 0, score = 0, answered = false, mistakes = [], shuffled = [];

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function start() {
  shuffled = shuffle(questions);
  current = 0; score = 0; answered = false; mistakes = [];
  document.getElementById('results').classList.remove('show');
  document.getElementById('quizCard').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  const q = shuffled[current];
  const total = shuffled.length;
  document.getElementById('progressBar').style.width = (current / total * 100) + '%';
  document.getElementById('progressLabel').textContent = `Questão ${current + 1} de ${total}`;
  document.getElementById('question').textContent = q.q;

  const optDiv = document.getElementById('options');
  optDiv.innerHTML = '';
  const indices = q.options.map((_, i) => i);
  const shuffledIdx = shuffle(indices);
  const newCorrect = shuffledIdx.indexOf(q.answer);

  shuffledIdx.forEach((origIdx, newIdx) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = q.options[origIdx];
    btn.onclick = () => selectAnswer(newIdx, newCorrect, q, shuffledIdx, origIdx);
    optDiv.appendChild(btn);
  });

  document.getElementById('feedback').className = 'feedback';
  document.getElementById('nextBtn').className = 'next-btn';
  answered = false;
}

function selectAnswer(chosen, correct, q, shuffledIdx, _) {
  if (answered) return;
  answered = true;
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => b.disabled = true);
  btns[correct].classList.add('correct');
  const fb = document.getElementById('feedback');
  if (chosen === correct) {
    score++;
    btns[chosen].classList.add('correct');
    fb.className = 'feedback ok show';
    fb.textContent = '✓ Correto! ' + q.explanation;
  } else {
    btns[chosen].classList.add('wrong');
    fb.className = 'feedback err show';
    fb.textContent = '✗ Incorreto. ' + q.explanation;
    mistakes.push({ q: q.q, wrong: btns[chosen].textContent, right: q.options[q.answer] });
  }
  document.getElementById('nextBtn').className = 'next-btn show';
}

function nextQuestion() {
  current++;
  if (current >= shuffled.length) showResults();
  else renderQuestion();
}

function showResults() {
  document.getElementById('quizCard').style.display = 'none';
  document.getElementById('progressBar').style.width = '100%';
  const total = shuffled.length;
  const pct = Math.round(score / total * 100);
  document.getElementById('scoreNum').textContent = score;
  document.getElementById('scoreDenom').textContent = 'de ' + total;
  let title, msg;
  if (pct >= 90) { title = 'Excelente!'; msg = 'Dominas muito bem os artigos!'; }
  else if (pct >= 70) { title = 'Muito bem!'; msg = 'Bom resultado! Revê os erros abaixo.'; }
  else if (pct >= 50) { title = 'Continua!'; msg = 'Já sabes bastante, mas há espaço para melhorar.'; }
  else { title = 'Não desistas!'; msg = 'Revê as regras e tenta outra vez!'; }
  document.getElementById('resultsTitle').textContent = title;
  document.getElementById('resultsMsg').textContent = `${pct}% correto. ${msg}`;
  const ml = document.getElementById('mistakesList');
  if (mistakes.length > 0) {
    ml.innerHTML = '<h3>Erros para rever:</h3>' + mistakes.map(m =>
      `<div class="mistake-item"><div>${m.q}</div><div>A tua resposta: <strong>${m.wrong}</strong> &nbsp;|&nbsp; Correto: <span class="correct-ans">${m.right}</span></div></div>`
    ).join('');
  } else {
    ml.innerHTML = '<p style="color:#276749;margin-top:16px">Sem erros! Perfeito!</p>';
  }
  document.getElementById('results').classList.add('show');
}

function restart() { start(); }
start();
</script>
</body>
</html>
